name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at 00:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          svg_path: assets/github-snake.svg
